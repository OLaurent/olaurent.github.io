<header class="site-header" id="site-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="OXL MATH — Accueil">
      <svg class="logo-svg" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="grad-or" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#D4AF37"/>
            <stop offset="100%" style="stop-color:#FFFACD"/>
          </linearGradient>
        </defs>
        <!-- Monogramme OXL en trait continu -->
        <text x="2" y="30" font-family="Montserrat, sans-serif" font-weight="700"
              font-size="26" fill="url(#grad-or)" letter-spacing="2">OXL</text>
        <text x="68" y="30" font-family="Montserrat, sans-serif" font-weight="300"
              font-size="18" fill="#E0E0E0" letter-spacing="4">MATH</text>
      </svg>
    </a>

    <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <nav class="main-nav" id="main-nav" aria-label="Navigation principale">
      <ul>
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" {{ if eq $.Section .Identifier }}class="active" aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>

<script>
  // Menu burger mobile
  document.getElementById('nav-toggle').addEventListener('click', function () {
    const nav = document.getElementById('main-nav');
    const expanded = this.getAttribute('aria-expanded') === 'true';
    this.setAttribute('aria-expanded', String(!expanded));
    nav.classList.toggle('open');
  });
</script>
