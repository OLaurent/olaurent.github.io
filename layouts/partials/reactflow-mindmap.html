{{ $mindmap := .Params.mindmap }}
{{ if $mindmap }}
{{ $pageId := .File.BaseFileName }}
<section class="chapitre-mindmap-section" aria-labelledby="mindmap-titre-{{ $pageId }}">
  <h2 class="groupe-titre" id="mindmap-titre-{{ $pageId }}">
    {{ with $mindmap.title }}{{ . }}{{ else }}Carte mentale{{ end }}
  </h2>
  <div class="reactflow-mindmap-wrapper">
    <div class="reactflow-mindmap-container" id="reactflow-mindmap-{{ $pageId }}"></div>
  </div>
</section>

<link rel="stylesheet" href="https://unpkg.com/@reactflow/core@11.11.4/dist/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
  // Fallback: if a separate ReactDOMClient UMD is available on the page,
  // map its createRoot to window.ReactDOM.createRoot without overriding.
  if (window.ReactDOMClient && typeof window.ReactDOMClient.createRoot === 'function') {
    window.ReactDOM = window.ReactDOM || window.ReactDOMClient.default || window.ReactDOM;
    if (!window.ReactDOM.createRoot) {
      window.ReactDOM.createRoot = window.ReactDOMClient.createRoot;
    }
  }
</script>
<script src="https://unpkg.com/@reactflow/core@11.11.4/dist/umd/index.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script>
(function() {
  function getReactFlowGlobals() {
    const flowCore = window.ReactFlowCore || null;
    const flowGlobal = window.ReactFlow || null;
    const flowCoreDefault = flowCore?.default || null;
    const flowGlobalDefault = flowGlobal?.default || null;

    const candidates = [
      flowCore,
      flowCoreDefault,
      flowGlobal,
      flowGlobalDefault
    ].filter(Boolean);

    const ReactFlowProvider =
      window.ReactFlowProvider ||
      flowCore?.ReactFlowProvider ||
      flowCoreDefault?.ReactFlowProvider ||
      flowGlobal?.ReactFlowProvider ||
      flowGlobalDefault?.ReactFlowProvider ||
      candidates.find(c => typeof c?.ReactFlowProvider === 'function')?.ReactFlowProvider ||
      candidates.find(c => typeof c?.default?.ReactFlowProvider === 'function')?.default?.ReactFlowProvider;

    function resolveReactFlow(candidate) {
      if (!candidate) return null;

      // Helpful debug: show candidate type and a few keys when available
      try {
        const kind = typeof candidate;
        if (kind === 'function') {
          console.debug('resolveReactFlow: candidate is function, name=', candidate.name || '(anonymous)');
        } else if (kind === 'object') {
          try { console.debug('resolveReactFlow: candidate keys=', Object.keys(candidate).slice(0,40)); } catch (e) {}
        }
      } catch (e) {
        // ignore
      }

      // Prefer explicit properties that should hold the top-level component
      if (candidate?.ReactFlow && typeof candidate.ReactFlow === 'function') {
        console.debug('resolveReactFlow: using candidate.ReactFlow');
        return candidate.ReactFlow;
      }
      if (candidate?.default?.ReactFlow && typeof candidate.default.ReactFlow === 'function') {
        console.debug('resolveReactFlow: using candidate.default.ReactFlow');
        return candidate.default.ReactFlow;
      }

      // If candidate.default is itself the component
      if (typeof candidate.default === 'function' && /reactflow|react-flow|graphview|flow/i.test(candidate.default.name || '')) {
        console.debug('resolveReactFlow: using candidate.default (function) name=', candidate.default.name);
        return candidate.default;
      }

      // If there is an explicit 'default' function export, prefer it only if it looks like ReactFlow
      if (typeof candidate === 'object' && typeof candidate.default === 'function') {
        // check string content for clues (cheap heuristic)
        try {
          const src = String(candidate.default);
          if (/reactflow|react-flow|ReactFlow|GraphView/.test(src)) {
            console.debug('resolveReactFlow: using candidate.default (heuristic match)');
            return candidate.default;
          }
        } catch (e) {}
      }

      // Look for a property explicitly named 'ReactFlow' (case-insensitive)
      try {
        for (const k of Object.keys(candidate)) {
          if (k.toLowerCase() === 'reactflow' && typeof candidate[k] === 'function') {
            console.debug('resolveReactFlow: found property', k);
            return candidate[k];
          }
        }
      } catch (e) {}

      // Helper: heuristics to recognize the main ReactFlow component vs smaller exports
      function looksLikeMainReactFlowFunction(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const src = String(fn);
          // Negative markers (edge/render helpers) -> reject
          if (/react-flow__edge-path|getMarkerEnd|getBezierPath|BaseEdge|EdgeWrapper|EdgeLabelRenderer|SmoothStepEdge|BezierEdge/i.test(src)) {
            return false;
          }
          // Positive markers for the main wrapper/component -> accept
          if (/react-flow__wrapper|react-flow__viewport|react-flow__nodes|react-flow__renderer|ReactFlowProvider|fitViewOnInit|nodesDraggable|edgesUpdatable|react-flow__edgelabel-renderer/i.test(src)) {
            return true;
          }
          // fallback by name
          const name = fn.name || '';
          if (/reactflow|react-flow|graphview|flow/i.test(name)) return true;
        } catch (e) {
          // ignore
        }
        return false;
      }

      // As a last resort, accept a raw function candidate only if heuristics indicate it's the main component
      if (typeof candidate === 'function') {
        if (looksLikeMainReactFlowFunction(candidate)) {
          console.debug('resolveReactFlow: accepting function candidate by heuristic name/source', candidate.name || '(anonymous)');
          return candidate;
        }
                if (!candidate) return null;
          source: parentId,
                function isLikelyReactFlow(fn) {
                  if (typeof fn !== 'function') return false;
                  try {
                    if (fn.displayName && String(fn.displayName).toLowerCase().includes('reactflow')) return true;
                    if (fn.name && String(fn.name).toLowerCase().includes('reactflow')) return true;
                    const src = fn.toString();
                    // indicators that look like the main ReactFlow component
                    const indicators = ['nodes', 'edges', 'fitView', 'fitViewOptions', 'nodesDraggable', 'nodesConnectable', 'attributionPosition', 'react-flow__', 'ReactFlowProvider'];
                    if (indicators.some(s => src.indexOf(s) !== -1)) return true;
                    // explicit reject common small edge/node renderers (id,path,labelX signature)
                    if (/\bid[, ]*path[, ]*labelX\b/.test(src)) return false;
                  } catch (e) {
                    // ignore
                  }
                  return false;
                }
          target: id,
                // If there is a direct `ReactFlow` export and it *looks* like the main component, accept it.
                try {
                  if (typeof candidate.ReactFlow === 'function' && isLikelyReactFlow(candidate.ReactFlow)) {
                    console.debug('resolveReactFlow: using candidate.ReactFlow');
                    return candidate.ReactFlow;
                  }
                  if (candidate.default && typeof candidate.default.ReactFlow === 'function' && isLikelyReactFlow(candidate.default.ReactFlow)) {
                    console.debug('resolveReactFlow: using candidate.default.ReactFlow');
                    return candidate.default.ReactFlow;
                  }
                  if (typeof candidate.default === 'function' && isLikelyReactFlow(candidate.default)) {
                    console.debug('resolveReactFlow: using candidate.default (function)');
                    return candidate.default;
                  }
                } catch (e) {
                  // access errors ignored
                }
          animated: node.animated === true,
                // Prefer explicit keys if present and likely
                const prefer = ['ReactFlow', 'default', 'Flow', 'GraphView'];
                for (const k of prefer) {
                  try {
                    const v = candidate[k];
                    if (isLikelyReactFlow(v)) {
                      console.debug('resolveReactFlow: using prefer key', k);
                      return v;
                    }
                    if (v && typeof v.default === 'function' && isLikelyReactFlow(v.default)) {
                      console.debug('resolveReactFlow: using prefer key default of', k);
                      return v.default;
                    }
                  } catch (e) {}
                }
          style: { stroke: '#D4AF37', strokeWidth: 2.5 }
                // Fallback scanning: pick the first function export that *looks like* the main component.
                try {
                  for (const k of Object.keys(candidate)) {
                    const v = candidate[k];
                    if (isLikelyReactFlow(v)) {
                      console.debug('resolveReactFlow: fallback found likely ReactFlow at key', k);
                      return v;
                    }
                  }
                  // last resort: any function (but avoid small edge renderers)
                  for (const k of Object.keys(candidate)) {
                    const v = candidate[k];
                    if (typeof v === 'function' && !/\bid[, ]*path[, ]*labelX\b/.test(String(v))) {
                      console.debug('resolveReactFlow: fallback any function at key', k);
                      return v;
                    }
                    if (v && typeof v.default === 'function') return v.default;
                  }
                } catch (e) {}
        });
                return null;
      }
      if (Array.isArray(node.children)) {
        node.children.forEach(child => walkTree(child, id, all));
      }
      return all;
    }

    function layoutElements(nodes, edges, direction = 'TB') {
      const graph = new dagreLib.graphlib.Graph();
      graph.setGraph({ rankdir: direction, ranksep: 70, nodesep: 24, marginx: 20, marginy: 20 });
      graph.setDefaultEdgeLabel(() => ({}));

      nodes.forEach(node => graph.setNode(node.id, { width: nodeWidth, height: nodeHeight }));
      edges.forEach(edge => graph.setEdge(edge.source, edge.target));
      dagreLib.layout(graph);

      return {
        nodes: nodes.map(node => {
          const nodeWithPosition = graph.node(node.id);
          return Object.assign({}, node, {
            position: {
              x: nodeWithPosition.x - nodeWidth / 2,
              y: nodeWithPosition.y - nodeHeight / 2
            }
          });
        }),
        edges
      };
    }

    const treeRoot = mindmapConfig.root || mindmapConfig;
    const treeData = walkTree(treeRoot);
    const layoutString = (mindmapConfig.layout || 'TB').toUpperCase();
    const layoutResult = layoutElements(treeData.nodes, treeData.edges, layoutString);
    const nodes = layoutResult.nodes;
    const edges = layoutResult.edges;

    function Flow() {
      const [stateNodes] = React.useState(nodes);
      const [stateEdges] = React.useState(edges);

      React.useEffect(() => {
        if (window.renderMathInElement && container) {
          window.renderMathInElement(container, {
            delimiters: [
              { left: '\\(', right: '\\)', display: false },
              { left: '\\[', right: '\\]', display: true }
            ],
            throwOnError: false
          });
        }
      }, []);

      return React.createElement(ReactFlow, {
        nodes: stateNodes,
        edges: stateEdges,
        fitView: true,
        fitViewOptions: { padding: 0.2 },
        nodesDraggable: true,
        nodesConnectable: false,
        zoomOnScroll: true,
        panOnDrag: true,
        attributionPosition: 'bottom-left'
      });
    }

    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(ReactFlowProvider, null, React.createElement(Flow, null)));
  }

  function initMindmap() {
    const globals = getReactFlowGlobals();
    let ReactFlow = globals.ReactFlow;

    console.log('React Flow globals:', {
      React: !!globals.React,
      ReactDOM: !!globals.ReactDOM,
      ReactFlow: !!ReactFlow,
      ReactFlowProvider: !!globals.ReactFlowProvider,
      dagreLib: !!globals.dagreLib,
      flowCore: !!globals.flowCore,
      flowGlobal: !!globals.flowGlobal
    });
    console.log('ReactFlow type:', typeof ReactFlow, ReactFlow);
    if (ReactFlow && typeof ReactFlow === 'object') {
      console.log('ReactFlow object keys:', Object.keys(ReactFlow));
      if (typeof ReactFlow.ReactFlow === 'function') {
        console.log('Using ReactFlow.ReactFlow as component');
        ReactFlow = ReactFlow.ReactFlow;
      } else if (typeof ReactFlow.default?.ReactFlow === 'function') {
        console.log('Using ReactFlow.default.ReactFlow as component');
        ReactFlow = ReactFlow.default.ReactFlow;
      }
    }
    globals.ReactFlow = ReactFlow;

    if (!globals.React || !globals.ReactDOM || !globals.ReactDOM.createRoot || !globals.ReactFlowProvider || !globals.ReactFlow) {
      return false;
    }
    if (!globals.dagreLib || !globals.dagreLib.graphlib) {
      console.error('Dagre failed to load. Expected window.dagre with graphlib.');
      return false;
    }

    const mindmapJson = '{{ $mindmap | jsonify | safeJS }}';
    let mindmapConfig;
    try {
      mindmapConfig = JSON.parse(mindmapJson);
    } catch (error) {
      console.error('Mindmap JSON parsing failed:', error, mindmapJson);
      return false;
    }

    const containerId = 'reactflow-mindmap-{{ $pageId }}';
    const container = document.getElementById(containerId);
    if (!container) {
      return false;
    }

    createMindmap(container, mindmapConfig, globals);
    return true;
  }

  function tryInit() {
    if (initMindmap()) return;

    let attempts = 0;
    const interval = window.setInterval(() => {
      if (initMindmap() || ++attempts >= 30) {
        window.clearInterval(interval);
        if (attempts >= 30) {
          console.error('React Flow mindmap failed to initialize after waiting for dependencies.');
        }
      }
    }, 100);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInit);
  } else {
    tryInit();
  }
})();
</script>

<style>
  .reactflow-mindmap-wrapper {
    width: 100%;
    min-height: 580px;
    border-radius: 18px;
    overflow: hidden;
    background: #080a12;
    border: 1px solid rgba(212, 175, 55, 0.18);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
  }

  .reactflow-mindmap-container {
    width: 100%;
    min-height: 580px;
    height: 100%;
  }

  .reactflow-node-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    text-align: center;
    padding: 0.85rem 0.9rem;
    line-height: 1.3;
    font-size: 0.92rem;
    color: #e8e8e8;
  }

  .mindmap-node-title {
    font-weight: 700;
    font-size: 1rem;
    color: #fffacd;
  }

  .mindmap-node-latex {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    color: #e0e0e0;
    margin-top: 0.2rem;
  }

  .mindmap-node-desc {
    color: #a8b2c8;
    font-size: 0.82rem;
    margin-top: 0.25rem;
  }

  .react-flow__node-default {
    background: rgba(22, 27, 51, 0.95) !important;
    border: 1px solid #D4AF37 !important;
  }

  .react-flow__edge-path {
    stroke: #D4AF37 !important;
    stroke-width: 2.5px !important;
  }

  .react-flow__handle {
    display: none;
  }
</style>
{{ end }}
