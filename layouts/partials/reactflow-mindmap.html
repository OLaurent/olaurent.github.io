{{ $mindmap := .Params.mindmap }}

{{ $pageId := .File.BaseFileName }}
<section class="chapitre-mindmap-section" aria-labelledby="mindmap-titre-{{ $pageId }}">
  <h2 class="groupe-titre" id="mindmap-titre-{{ $pageId }}">
    {{ with $mindmap.title }}{{ . }}{{ else }}Carte mentale{{ end }}
  </h2>
  <div class="reactflow-mindmap-wrapper">
    <div class="reactflow-mindmap-container" id="reactflow-mindmap-{{ $pageId }}"></div>

</section>

<link rel="stylesheet" href="https://unpkg.com/@reactflow/core@11.11.4/dist/style.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
  // Fallback: if a separate ReactDOMClient UMD is available on the page,
  // map its createRoot to window.ReactDOM.createRoot without overriding.
  if (window.ReactDOMClient && typeof window.ReactDOMClient.createRoot === 'function') {
    window.ReactDOM = window.ReactDOM || window.ReactDOMClient.default || window.ReactDOM;
    if (!window.ReactDOM.createRoot) {
      window.ReactDOM.createRoot = window.ReactDOMClient.createRoot;
    }
  }
</script>
<script src="https://unpkg.com/@reactflow/core@11.11.4/dist/umd/index.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script>
(function() {
  function getReactFlowGlobals() {
    const flowCore = window.ReactFlowCore || null;
    const flowGlobal = window.ReactFlow || null;
    const flowCoreDefault = flowCore?.default || null;
    const flowGlobalDefault = flowGlobal?.default || null;

    const candidates = [
      flowCore,
      flowCoreDefault,
      flowGlobal,
      flowGlobalDefault
    ].filter(Boolean);

    // Prefer explicit `ReactFlow` export found on candidate modules before running heuristics
    // Store the module object (not individual property functions) so later code can unwrap safely
    let explicitReactFlowFromCandidates = null;
    for (const c of candidates) {
      try {
        if (c && typeof c.ReactFlow === 'function') {
          explicitReactFlowFromCandidates = c; // keep module object
          break;
        }
        if (c && c.default && typeof c.default.ReactFlow === 'function') {
          explicitReactFlowFromCandidates = c.default; // keep module object
          break;
        }
        if (c && typeof c.default === 'function' && /reactflow|ReactFlow/i.test(String(c.default))) {
          explicitReactFlowFromCandidates = c.default; // also keep default function as module-like
          break;
        }
      } catch (e) {}
    }

    const ReactFlowProvider =
      window.ReactFlowProvider ||
      flowCore?.ReactFlowProvider ||
      flowCoreDefault?.ReactFlowProvider ||
      flowGlobal?.ReactFlowProvider ||
      flowGlobalDefault?.ReactFlowProvider ||
      candidates.find(c => typeof c?.ReactFlowProvider === 'function')?.ReactFlowProvider ||
      candidates.find(c => typeof c?.default?.ReactFlowProvider === 'function')?.default?.ReactFlowProvider;

    function resolveReactFlow(candidate) {
      if (!candidate) return null;

      // Helpful debug: show candidate type and a few keys when available
      try {
        const kind = typeof candidate;
        if (kind === 'function') {
          console.debug('resolveReactFlow: candidate is function, name=', candidate.name || '(anonymous)');
        } else if (kind === 'object') {
          try { console.debug('resolveReactFlow: candidate keys=', Object.keys(candidate).slice(0,40)); } catch (e) {}
        }
      } catch (e) {
        // ignore
      }

      // Utility detection: reject functions that are clearly helpers (getRectOfNodes, getNodesBounds, etc.)
      function isUtilityFunction(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const name = (fn.name || fn.displayName || '').toLowerCase();
          if (/^(get|set|is|has|compute|calc|to|from|apply|update)/i.test(name)) return true;
          if (/getrectofnodes|getnodesbounds|getrect|getnodes|applynodechanges|applychanges|updatenodechanges|updatenodes/i.test(name)) return true;
          const src = String(fn);
          if (/\[DEPRECATED\]|getRectOfNodes|getNodesBounds|console\.warn\(/i.test(src)) return true;
          if (/\breduce\(/.test(src) && /getrectofnodes|getnodesbounds|nodes|rect|bounds/i.test(src)) return true;
        } catch (e) {}
        return false;
      }

      // Prefer explicit properties that should hold the top-level component
      // Return the module object itself so the caller can choose the correct export (safer than returning provider functions)
      if (candidate?.ReactFlow && typeof candidate.ReactFlow === 'function' && !isUtilityFunction(candidate.ReactFlow)) {
        console.debug('resolveReactFlow: using candidate module (has ReactFlow)');
        return candidate;
      }
      // If ReactFlow property is present under candidate.ReactFlow.default, return candidate (module-like)
      if (candidate?.ReactFlow && candidate.ReactFlow?.default && typeof candidate.ReactFlow.default === 'function' && !isUtilityFunction(candidate.ReactFlow.default)) {
        console.debug('resolveReactFlow: using candidate module (ReactFlow.default)');
        return candidate;
      }
      if (candidate?.default?.ReactFlow && typeof candidate.default.ReactFlow === 'function' && !isUtilityFunction(candidate.default.ReactFlow)) {
        console.debug('resolveReactFlow: using candidate.default (module-like, has ReactFlow)');
        return candidate.default;
      }

      // If candidate.default is itself the component and not a utility
      if (typeof candidate.default === 'function' && !isUtilityFunction(candidate.default) && /reactflow|react-flow|graphview|flow/i.test(candidate.default.name || '')) {
        console.debug('resolveReactFlow: using candidate.default (function) name=', candidate.default.name);
        return candidate.default;
      }

      // If there is an explicit 'default' function export, prefer it only if it looks like ReactFlow and is not a utility
      if (typeof candidate === 'object' && typeof candidate.default === 'function' && !isUtilityFunction(candidate.default)) {
        try {
          const src = String(candidate.default);
          if (/reactflow|react-flow|ReactFlow|GraphView/.test(src)) {
            console.debug('resolveReactFlow: using candidate.default (heuristic match)');
            return candidate.default;
          }
        } catch (e) {}
      }

      // Look for a property explicitly named 'ReactFlow' (case-insensitive)
      try {
        for (const k of Object.keys(candidate)) {
          if (k.toLowerCase() === 'reactflow') {
            const v = candidate[k];
            if (typeof v === 'function') {
              console.debug('resolveReactFlow: found property', k);
              return v;
            }
            if (v && typeof v.default === 'function') {
              console.debug('resolveReactFlow: found property', k, 'with .default');
              return v.default;
            }
          }
        }
      } catch (e) {}

      // Helper: heuristics to recognize the main ReactFlow component vs smaller exports
      function looksLikeMainReactFlowFunction(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const src = String(fn);
          // Reject obvious edge/node renderers
          if (/react-flow__edge-path|getMarkerEnd|getBezierPath|BaseEdge|EdgeWrapper|EdgeLabelRenderer|SmoothStepEdge|BezierEdge/i.test(src)) {
            return false;
          }
          // Accept if the function source or name contains React Flow indicators
          if (/react-flow__wrapper|react-flow__viewport|react-flow__nodes|react-flow__renderer|ReactFlowProvider|fitViewOnInit|nodesDraggable|edgesUpdatable|react-flow__edgelabel-renderer/i.test(src)) {
            return true;
          }
          const name = fn.name || fn.displayName || '';
          if (/reactflow|react-flow|graphview|flow/i.test(name)) return true;
        } catch (e) {
          // ignore
        }
        return false;
      }

      // More permissive check used when scanning exports
      function isLikelyReactFlow(fn) {
        if (typeof fn !== 'function') return false;
        try {
          if (fn.displayName && String(fn.displayName).toLowerCase().includes('reactflow')) return true;
          if (fn.name && String(fn.name).toLowerCase().includes('reactflow')) return true;
          const src = String(fn);
          // positive indicators
          const indicators = ['nodes', 'edges', 'fitView', 'fitViewOptions', 'nodesDraggable', 'nodesConnectable', 'attributionPosition', 'fitViewOnInit', 'react-flow__renderer', 'react-flow__viewport', 'react-flow__nodes'];
          if (indicators.some(s => src.indexOf(s) !== -1)) return true;
          // negative indicators that strongly suggest an edge/node renderer or panel helper
          if (/react-flow__panel|labelX|labelY|markerEnd|markerStart|interactionWidth|edge-interaction|edge-path|EdgeLabelRenderer|BaseEdge|BezierEdge/i.test(src)) return false;
          // avoid utility-like functions
          if (isUtilityFunction(fn)) return false;
        } catch (e) {}
        return false;
      }

      // Detect provider-like functions (they accept children and pass a `value` prop)
      function isProviderFunction(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const src = String(fn);
          if (/\bchildren\b/.test(src) && /\bvalue\b/.test(src)) return true;
          if (/createElement\([^,]+,\s*\{\s*value:/.test(src)) return true;
          const name = fn.name || fn.displayName || '';
          if (/Provider/i.test(name)) return true;
        } catch (e) {}
        return false;
      }

      // If candidate is a raw function, accept it only if it looks like the main component
      if (typeof candidate === 'function') {
        if (!isUtilityFunction(candidate) && (looksLikeMainReactFlowFunction(candidate) || isLikelyReactFlow(candidate))) {
          console.debug('resolveReactFlow: accepting function candidate', candidate.name || '(anonymous)');
          return candidate;
        }
        return null;
      }

      // Prefer explicit keys if present and likely
      const prefer = ['ReactFlow', 'default', 'Flow', 'GraphView'];
      for (const k of prefer) {
        try {
          const v = candidate[k];
          if (typeof v === 'function' && !isUtilityFunction(v) && isLikelyReactFlow(v)) {
            console.debug('resolveReactFlow: using prefer key', k);
            return v;
          }
          if (v && typeof v.default === 'function' && !isUtilityFunction(v.default) && isLikelyReactFlow(v.default)) {
            console.debug('resolveReactFlow: using prefer key default of', k);
            return v.default;
          }
        } catch (e) {}
      }

      // Fallback scanning: pick the first function export that looks like the main component
      try {
        for (const k of Object.keys(candidate)) {
          // skip obvious edge/node helpers or providers by key name
          if (/(edge|bezier|label|baseedge|edgelabelrenderer|provider|panel)/i.test(k)) continue;
          const v = candidate[k];
          if (typeof v === 'function') {
            // skip provider-like functions or explicit edge renderers
            if (isProviderFunction(v) || isUtilityFunction(v)) continue;
            const src = String(v);
            if (/labelX|labelY|markerEnd|markerStart|interactionWidth|edge-path|edge-interaction/i.test(src)) continue;
            if (isLikelyReactFlow(v)) {
              console.debug('resolveReactFlow: fallback found likely ReactFlow at key', k);
              return v;
            }
          }
          if (v && typeof v.default === 'function' && !isProviderFunction(v.default) && !isUtilityFunction(v.default) && isLikelyReactFlow(v.default)) {
            console.debug('resolveReactFlow: fallback found likely ReactFlow.default at key', k);
            return v.default;
          }
        }
        // last resort: any non-edge function (skip keys that look like edges)
        for (const k of Object.keys(candidate)) {
          if (/(edge|bezier|label|baseedge|edgelabelrenderer|provider|panel)/i.test(k)) continue;
          const v = candidate[k];
          if (typeof v === 'function') {
            if (isProviderFunction(v) || isUtilityFunction(v)) continue;
            const src = String(v);
            if (/labelX|labelY|markerEnd|markerStart|interactionWidth/i.test(src)) continue;
            console.debug('resolveReactFlow: fallback any function at key', k);
            return v;
          }
          if (v && typeof v.default === 'function' && !isProviderFunction(v.default) && !isUtilityFunction(v.default)) return v.default;
        }
      } catch (e) {}

      return null;
    }

    // Resolve top-level ReactFlow candidate and return runtime globals
    const resolvedReactFlowCandidate = resolveReactFlow(flowCore) || resolveReactFlow(flowCoreDefault) || resolveReactFlow(flowGlobal) || resolveReactFlow(flowGlobalDefault) || flowCore?.ReactFlow || flowGlobal?.ReactFlow || null;

    // Prefer explicit globals when available (most reliable)
    let explicitReactFlow = null;
    try {
      if (typeof window.ReactFlow === 'function') explicitReactFlow = window.ReactFlow;
      else if (window.ReactFlow && typeof window.ReactFlow.ReactFlow === 'function') explicitReactFlow = window.ReactFlow.ReactFlow;
      else if (window.ReactFlow && window.ReactFlow.default && typeof window.ReactFlow.default === 'function') explicitReactFlow = window.ReactFlow.default;
      else if (window.ReactFlowCore && typeof window.ReactFlowCore.ReactFlow === 'function') explicitReactFlow = window.ReactFlowCore.ReactFlow;
      else if (window.ReactFlowCore && window.ReactFlowCore.default && typeof window.ReactFlowCore.default === 'function') explicitReactFlow = window.ReactFlowCore.default;
      else if (flowCore && typeof flowCore.ReactFlow === 'function') explicitReactFlow = flowCore.ReactFlow;
      else if (flowCoreDefault && typeof flowCoreDefault.ReactFlow === 'function') explicitReactFlow = flowCoreDefault.ReactFlow;
    } catch (e) {}

    let finalReactFlow = explicitReactFlow || explicitReactFlowFromCandidates || resolvedReactFlowCandidate;

    // Strong canonical preference: prefer the canonical UMD globals when available
    try {
      if (window.ReactFlowCore && typeof window.ReactFlowCore.ReactFlow === 'function') {
        finalReactFlow = window.ReactFlowCore.ReactFlow;
        console.debug('getReactFlowGlobals: forcing ReactFlow from window.ReactFlowCore.ReactFlow');
      } else if (window.ReactFlow && typeof window.ReactFlow.ReactFlow === 'function') {
        finalReactFlow = window.ReactFlow.ReactFlow;
        console.debug('getReactFlowGlobals: forcing ReactFlow from window.ReactFlow.ReactFlow');
      } else if (typeof window.ReactFlow === 'function') {
        finalReactFlow = window.ReactFlow;
        console.debug('getReactFlowGlobals: forcing ReactFlow from window.ReactFlow');
      } else if (flowCore && typeof flowCore.ReactFlow === 'function') {
        finalReactFlow = flowCore.ReactFlow;
        console.debug('getReactFlowGlobals: forcing ReactFlow from flowCore.ReactFlow');
      }
    } catch (e) {
      // ignore
    }

    const dagreLib = window.dagre || window.dagreLib || null;
    const React = window.React || null;
    const ReactDOM = window.ReactDOM || null;
    const ReactFlow = finalReactFlow;

    return { React, ReactDOM, ReactFlow, ReactFlowProvider, dagreLib, flowCore, flowGlobal };
  }

  // createMindmap: builds nodes/edges and mounts React Flow into the container
  function createMindmap(container, mindmapConfig, globals) {
    // Local runtime helpers & defaults
    const dagreLib = globals.dagreLib || window.dagre || window.dagreLib || null;
    const React = globals.React || window.React || null;
    const ReactDOM = globals.ReactDOM || window.ReactDOM || null;
    let ReactFlow = globals.ReactFlow || window.ReactFlow || null;
    let ReactFlowProvider = globals.ReactFlowProvider || window.ReactFlowProvider || null;
    const nodeWidth = (mindmapConfig && mindmapConfig.nodeWidth) || 220;
    const nodeHeight = (mindmapConfig && mindmapConfig.nodeHeight) || 80;

    // Strong canonical-first selection: prefer UMD globals (window.ReactFlowCore, window.ReactFlow)
    // before running heuristics on module objects. This avoids selecting small helper
    // functions that happen to be the first function export (e.g. applyNodeChanges).
    let ReactFlowComp = null;
    let chosenModule = null;
    try {
      if (window.ReactFlowCore && typeof window.ReactFlowCore.ReactFlow === 'function') {
        ReactFlowComp = window.ReactFlowCore.ReactFlow;
        if (!ReactFlowProvider && typeof window.ReactFlowCore.ReactFlowProvider === 'function') {
          ReactFlowProvider = window.ReactFlowCore.ReactFlowProvider;
        }
        console.debug('createMindmap: canonical pick window.ReactFlowCore.ReactFlow');
      } else if (window.ReactFlow && typeof window.ReactFlow.ReactFlow === 'function') {
        ReactFlowComp = window.ReactFlow.ReactFlow;
        if (!ReactFlowProvider && typeof window.ReactFlow.ReactFlowProvider === 'function') {
          ReactFlowProvider = window.ReactFlow.ReactFlowProvider;
        }
        console.debug('createMindmap: canonical pick window.ReactFlow.ReactFlow');
      } else if (typeof window.ReactFlow === 'function') {
        ReactFlowComp = window.ReactFlow;
        console.debug('createMindmap: canonical pick window.ReactFlow (function)');
      } else if (globals.flowCore && typeof globals.flowCore.ReactFlow === 'function') {
        ReactFlowComp = globals.flowCore.ReactFlow;
        if (!ReactFlowProvider && typeof globals.flowCore.ReactFlowProvider === 'function') {
          ReactFlowProvider = globals.flowCore.ReactFlowProvider;
        }
        console.debug('createMindmap: canonical pick globals.flowCore.ReactFlow');
      } else if (globals.ReactFlow && typeof globals.ReactFlow === 'function') {
        ReactFlowComp = globals.ReactFlow;
        console.debug('createMindmap: using globals.ReactFlow (function)');
      } else {
        // fall back to scanning known module objects
        if (window.ReactFlowCore && (window.ReactFlowCore.ReactFlow || window.ReactFlowCore.default)) {
          chosenModule = window.ReactFlowCore;
        } else if (window.ReactFlow && (window.ReactFlow.ReactFlow || typeof window.ReactFlow === 'function' || window.ReactFlow.default)) {
          chosenModule = window.ReactFlow;
        } else if (globals.flowCore && (globals.flowCore.ReactFlow || globals.flowCore.default)) {
          chosenModule = globals.flowCore;
        } else if (globals.flowGlobal && (globals.flowGlobal.ReactFlow || globals.flowGlobal.default)) {
          chosenModule = globals.flowGlobal;
        } else if (globals.ReactFlow && (typeof globals.ReactFlow === 'function' || globals.ReactFlow.ReactFlow || globals.ReactFlow.default)) {
          if (typeof globals.ReactFlow === 'function') {
            ReactFlowComp = globals.ReactFlow;
          } else {
            chosenModule = globals.ReactFlow;
          }
        }
      }
    } catch (e) {}

    if (chosenModule) {
      // Try to unwrap a real ReactFlow component function from the chosen module.
      function localIsProviderFunction(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const s = String(fn);
          return /\bchildren\b/.test(s) && /\bvalue\b/.test(s);
        } catch (e) { return false; }
      }
      function localIsEdgeRenderer(fn) {
        if (typeof fn !== 'function') return false;
        try { return /labelX|labelY|markerEnd|markerStart|edge-path|EdgeLabelRenderer|BaseEdge|BezierEdge|SmoothStepEdge|StepEdge|StraightEdge|interactionWidth/i.test(String(fn)); } catch (e) { return false; }
      }
      function localIsUtilityFunction(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const name = (fn.name || fn.displayName || '').toLowerCase();
          if (/^(get|set|is|has|compute|calc|to|from)/i.test(name)) return true;
          if (/getrectofnodes|getnodesbounds|getrect|getnodes/i.test(name)) return true;
          const src = String(fn);
          if (/\[DEPRECATED\]|getRectOfNodes|getNodesBounds|console\.warn\(/i.test(src)) return true;
          if (/\breduce\(/.test(src) && /getrectofnodes|getnodesbounds|nodes|rect|bounds/i.test(src)) return true;
        } catch (e) {}
        return false;
      }
      function localIsLikelyReactFlow(fn) {
        if (typeof fn !== 'function') return false;
        try {
          const name = fn.name || fn.displayName || '';
          if (/reactflow|react-flow|graphview|flow/i.test(name)) return true;
          const src = String(fn);
          const indicators = ['nodes', 'edges', 'fitView', 'fitViewOptions', 'nodesDraggable', 'nodesConnectable', 'attributionPosition', 'fitViewOnInit'];
          if (indicators.some(s => src.indexOf(s) !== -1)) return true;
          if (localIsUtilityFunction(fn)) return false;
        } catch (e) {}
        return false;
      }

      let comp = null;
      if (typeof chosenModule.ReactFlow === 'function' && !localIsUtilityFunction(chosenModule.ReactFlow)) comp = chosenModule.ReactFlow;
      else if (chosenModule.default && typeof chosenModule.default === 'function' && !localIsUtilityFunction(chosenModule.default)) comp = chosenModule.default;
      else if (typeof chosenModule === 'function' && !localIsUtilityFunction(chosenModule)) comp = chosenModule;
      else {
        // scan module properties for a likely component (avoid providers/panels/edges/utilities)
        try {
          for (const k of Object.keys(chosenModule)) {
            const v = chosenModule[k];
            if (typeof v === 'function' && !localIsProviderFunction(v) && !localIsEdgeRenderer(v) && !localIsUtilityFunction(v) && localIsLikelyReactFlow(v)) {
              comp = v;
              break;
            }
          }
        } catch (e) {}
      }

      // fallback: accept module.ReactFlow even if not function (will be unwrapped later), but avoid utility functions
      if (!comp && typeof chosenModule.ReactFlow !== 'undefined' && !localIsUtilityFunction(chosenModule.ReactFlow)) comp = chosenModule.ReactFlow;

      ReactFlowComp = comp;
      if (chosenModule.ReactFlowProvider && typeof chosenModule.ReactFlowProvider === 'function') ReactFlowProvider = chosenModule.ReactFlowProvider;
      else if (chosenModule.default && chosenModule.default.ReactFlowProvider && typeof chosenModule.default.ReactFlowProvider === 'function') ReactFlowProvider = chosenModule.default.ReactFlowProvider;
    }

    if (!ReactFlowComp && typeof window.ReactFlow === 'function') ReactFlowComp = window.ReactFlow;
    if (!ReactFlowComp) ReactFlowComp = ReactFlow;

    // Strong override: if heuristics failed or a module object was chosen,
    // prefer canonical UMD globals and unwrap module objects to get the real component.
    try {
      if (!ReactFlowComp || typeof ReactFlowComp !== 'function') {
        if (window.ReactFlowCore && typeof window.ReactFlowCore.ReactFlow === 'function') {
          ReactFlowComp = window.ReactFlowCore.ReactFlow;
          console.debug('createMindmap: forced ReactFlow from window.ReactFlowCore.ReactFlow');
          if (!ReactFlowProvider && typeof window.ReactFlowCore.ReactFlowProvider === 'function') {
            ReactFlowProvider = window.ReactFlowCore.ReactFlowProvider;
          }
        } else if (window.ReactFlow && typeof window.ReactFlow.ReactFlow === 'function') {
          ReactFlowComp = window.ReactFlow.ReactFlow;
          console.debug('createMindmap: forced ReactFlow from window.ReactFlow.ReactFlow');
          if (!ReactFlowProvider && typeof window.ReactFlow.ReactFlowProvider === 'function') {
            ReactFlowProvider = window.ReactFlow.ReactFlowProvider;
          }
        } else if (typeof window.ReactFlow === 'function') {
          ReactFlowComp = window.ReactFlow;
          console.debug('createMindmap: forced ReactFlow from window.ReactFlow (function)');
        } else if (globals.flowCore && typeof globals.flowCore.ReactFlow === 'function') {
          ReactFlowComp = globals.flowCore.ReactFlow;
          console.debug('createMindmap: forced ReactFlow from globals.flowCore.ReactFlow');
          if (!ReactFlowProvider && typeof globals.flowCore.ReactFlowProvider === 'function') {
            ReactFlowProvider = globals.flowCore.ReactFlowProvider;
          }
        } else if (globals.flowGlobal && typeof globals.flowGlobal.ReactFlow === 'function') {
          ReactFlowComp = globals.flowGlobal.ReactFlow;
          console.debug('createMindmap: forced ReactFlow from globals.flowGlobal.ReactFlow');
        }
      } else if (typeof ReactFlowComp === 'object') {
        // module object: try unwrapping known properties to find the component function
        try {
          if (ReactFlowComp.ReactFlow && typeof ReactFlowComp.ReactFlow === 'function') {
            ReactFlowComp = ReactFlowComp.ReactFlow;
            console.debug('createMindmap: unwrapped ReactFlow from module.ReactFlow');
          } else if (ReactFlowComp.default && typeof ReactFlowComp.default.ReactFlow === 'function') {
            ReactFlowComp = ReactFlowComp.default.ReactFlow;
            console.debug('createMindmap: unwrapped ReactFlow from module.default.ReactFlow');
          } else if (ReactFlowComp.default && typeof ReactFlowComp.default === 'function') {
            ReactFlowComp = ReactFlowComp.default;
            console.debug('createMindmap: unwrapped ReactFlow from module.default (function)');
          }
        } catch (e) {}
      }
    } catch (e) {}

    console.debug('createMindmap: chosen ReactFlow component type=', typeof ReactFlowComp, ReactFlowComp && (ReactFlowComp.name || ReactFlowComp.displayName || '[function]'));
    ReactFlow = ReactFlowComp;

    // If we still don't have a usable function component, try loading an ESM bundle dynamically as a last resort
    function isFunctionLike(x) { return typeof x === 'function'; }
    async function tryLoadEsmFallback() {
      const urls = [
        'https://unpkg.com/@reactflow/core@11.11.4/dist/esm/index.js',
        'https://cdn.jsdelivr.net/npm/@reactflow/core@11.11.4/dist/esm/index.js',
        'https://unpkg.com/@reactflow/core@11.11.4/dist/index.esm.js',
        'https://cdn.jsdelivr.net/npm/@reactflow/core@11.11.4/dist/index.esm.js'
      ];
      for (const u of urls) {
        try {
          console.debug('createMindmap: attempting dynamic import of ReactFlow ESM from', u);
          const mod = await import(u);
          if (mod) {
            const candidate = mod.ReactFlow || mod.default || mod;
            if (isFunctionLike(candidate) || (candidate && isFunctionLike(candidate.ReactFlow))) {
              if (candidate.ReactFlow && isFunctionLike(candidate.ReactFlow)) {
                ReactFlow = candidate.ReactFlow;
                if (!ReactFlowProvider && candidate.ReactFlowProvider) ReactFlowProvider = candidate.ReactFlowProvider;
                console.debug('createMindmap: loaded ReactFlow from ESM', u);
                return true;
              }
              if (isFunctionLike(candidate)) {
                ReactFlow = candidate;
                if (!ReactFlowProvider && mod.ReactFlowProvider) ReactFlowProvider = mod.ReactFlowProvider;
                console.debug('createMindmap: loaded ReactFlow (default) from ESM', u);
                return true;
              }
            }
          }
        } catch (e) {
          console.debug('createMindmap: dynamic import failed for', u, e && (e.message || e));
        }
      }
      return false;
    }

    // Walk the provided mindmap tree and build nodes/edges arrays suitable for layout
    function walkTree(node, parentId = null, all = { nodes: [], edges: [] }) {
      if (!node) return all;
      const id = node.id || ('n' + Math.random().toString(36).slice(2,9));

      function escapeHtml(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      const title = node.title || node.name || '';
      const desc = node.desc || node.description || '';
      const latex = node.latex || node.tex || '';

      const labelHtml = `
        <div class="reactflow-node-label">
          <div class="mindmap-node-title">${escapeHtml(title)}</div>
          ${latex ? `<div class="mindmap-node-latex">${escapeHtml(latex)}</div>` : ''}
          ${desc ? `<div class="mindmap-node-desc">${escapeHtml(desc)}</div>` : ''}
        </div>
      `;

      all.nodes.push({ id, data: { label: labelHtml }, width: nodeWidth, height: nodeHeight });
      if (parentId) {
        all.edges.push({ id: `${parentId}-${id}`, source: parentId, target: id });
      }

      if (Array.isArray(node.children)) {
        node.children.forEach(child => walkTree(child, id, all));
      }
      return all;
    }

    function layoutElements(nodes, edges, direction = 'TB') {
      const graph = new dagreLib.graphlib.Graph();
      graph.setGraph({ rankdir: direction, ranksep: 70, nodesep: 24, marginx: 20, marginy: 20 });
      graph.setDefaultEdgeLabel(() => ({}));

      nodes.forEach(node => graph.setNode(node.id, { width: nodeWidth, height: nodeHeight }));
      edges.forEach(edge => graph.setEdge(edge.source, edge.target));
      dagreLib.layout(graph);

      return {
        nodes: nodes.map(node => {
          const nodeWithPosition = graph.node(node.id);
          return Object.assign({}, node, {
            position: {
              x: nodeWithPosition.x - nodeWidth / 2,
              y: nodeWithPosition.y - nodeHeight / 2
            }
          });
        }),
        edges
      };
    }

    const treeRoot = mindmapConfig.root || mindmapConfig;
    const treeData = walkTree(treeRoot);
    const layoutString = (mindmapConfig.layout || 'TB').toUpperCase();
    const layoutResult = layoutElements(treeData.nodes, treeData.edges, layoutString);
    const nodes = layoutResult.nodes;
    const edges = layoutResult.edges;

    function Flow() {
      const [stateNodes] = React.useState(nodes);
      const [stateEdges] = React.useState(edges);

      React.useEffect(() => {
        if (window.renderMathInElement && container) {
          window.renderMathInElement(container, {
            delimiters: [
              { left: '\\(', right: '\\)', display: false },
              { left: '\\[', right: '\\]', display: true }
            ],
            throwOnError: false
          });
        }
      }, []);

      return React.createElement(ReactFlow, {
        nodes: stateNodes,
        edges: stateEdges,
        fitView: true,
        fitViewOptions: { padding: 0.2 },
        nodesDraggable: true,
        nodesConnectable: false,
        zoomOnScroll: true,
        panOnDrag: true,
        attributionPosition: 'bottom-left'
      });
    }

    function mountFlow() {
      try {
        const root = ReactDOM.createRoot(container);
        if (ReactFlowProvider && typeof ReactFlowProvider === 'function') {
          root.render(React.createElement(ReactFlowProvider, null, React.createElement(Flow, null)));
        } else {
          root.render(React.createElement(Flow, null));
        }
      } catch (e) {
        console.error('createMindmap: mount failed', e);
      }
    }

    // If candidate is not a clear function, try ESM dynamic import before mounting
    if (!isFunctionLike(ReactFlow)) {
      tryLoadEsmFallback().then(ok => {
        if (ok && isFunctionLike(ReactFlow)) {
          mountFlow();
        } else {
          // As last resort, attempt to unwrap module-like object to a function and mount
          try {
            if (ReactFlow && typeof ReactFlow === 'object') {
              if (typeof ReactFlow.ReactFlow === 'function') ReactFlow = ReactFlow.ReactFlow;
              else if (ReactFlow.default && typeof ReactFlow.default === 'function') ReactFlow = ReactFlow.default;
            }
          } catch (e) {}
          if (isFunctionLike(ReactFlow)) mountFlow();
          else console.error('createMindmap: no usable ReactFlow component found to mount');
        }
      }).catch(err => console.error('createMindmap: ESM fallback error', err));
      return;
    }

    // otherwise mount immediately
    mountFlow();
  }

  function initMindmap() {
    const globals = getReactFlowGlobals();
    let ReactFlow = globals.ReactFlow;

    console.log('React Flow globals:', {
      React: !!globals.React,
      ReactDOM: !!globals.ReactDOM,
      ReactFlow: !!ReactFlow,
      ReactFlowProvider: !!globals.ReactFlowProvider,
      dagreLib: !!globals.dagreLib,
      flowCore: !!globals.flowCore,
      flowGlobal: !!globals.flowGlobal
    });
    console.log('ReactFlow type:', typeof ReactFlow, ReactFlow);
    if (ReactFlow && typeof ReactFlow === 'object') {
      console.log('ReactFlow object keys:', Object.keys(ReactFlow));
      if (typeof ReactFlow.ReactFlow === 'function') {
        console.log('Using ReactFlow.ReactFlow as component');
        ReactFlow = ReactFlow.ReactFlow;
      } else if (typeof ReactFlow.default?.ReactFlow === 'function') {
        console.log('Using ReactFlow.default.ReactFlow as component');
        ReactFlow = ReactFlow.default.ReactFlow;
      }
    }
    // If the chosen export is a function that looks like an edge/node renderer,
    // attempt to pick the explicit `ReactFlow` export from common module candidates.
    function isEdgeRenderer(fn) {
      try {
        const s = String(fn);
        return /labelX|labelY|markerEnd|markerStart|edge-path|EdgeLabelRenderer|BaseEdge|BezierEdge|SmoothStepEdge|StepEdge|StraightEdge|interactionWidth/i.test(s);
      } catch (e) {
        return false;
      }
    }

    if (typeof ReactFlow === 'function' && isEdgeRenderer(ReactFlow)) {
      console.warn('resolveReactFlow: selected function looks like an edge renderer; trying explicit ReactFlow exports');
      const preferCandidates = [globals.flowCore, globals.flowCore?.default, globals.flowGlobal, globals.flowGlobal?.default, window.ReactFlowCore, window.ReactFlow, window.ReactFlowCore?.default, window.ReactFlow?.default];
      for (const cand of preferCandidates) {
        try {
          if (!cand) continue;
          if (typeof cand.ReactFlow === 'function') {
            ReactFlow = cand.ReactFlow;
            console.debug('resolveReactFlow: switched to cand.ReactFlow');
            break;
          }
          if (typeof cand.default === 'function' && /reactflow|ReactFlow/i.test(String(cand.default))) {
            ReactFlow = cand.default;
            console.debug('resolveReactFlow: switched to cand.default');
            break;
          }
        } catch (e) {}
      }
    }

    globals.ReactFlow = ReactFlow;

    if (!globals.React || !globals.ReactDOM || !globals.ReactDOM.createRoot || !globals.ReactFlowProvider || !globals.ReactFlow) {
      return false;
    }
    if (!globals.dagreLib || !globals.dagreLib.graphlib) {
      console.error('Dagre failed to load. Expected window.dagre with graphlib.');
      return false;
    }

    const mindmapJson = '{{ $mindmap | jsonify | safeJS }}';
    let mindmapConfig;
    try {
      mindmapConfig = JSON.parse(mindmapJson);
    } catch (error) {
      console.error('Mindmap JSON parsing failed:', error, mindmapJson);
      return false;
    }

    const containerId = 'reactflow-mindmap-{{ $pageId }}';
    const container = document.getElementById(containerId);
    if (!container) {
      return false;
    }

    createMindmap(container, mindmapConfig, globals);
    return true;
  }

  function tryInit() {
    if (initMindmap()) return;

    let attempts = 0;
    const interval = window.setInterval(() => {
      if (initMindmap() || ++attempts >= 30) {
        window.clearInterval(interval);
        if (attempts >= 30) {
          console.error('React Flow mindmap failed to initialize after waiting for dependencies.');
        }
      }
    }, 100);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInit);
  } else {
    tryInit();
  }
})();
</script>
