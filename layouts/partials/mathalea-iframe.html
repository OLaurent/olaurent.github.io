<!-- partial/mathalea-iframe.html — appelé avec . = chaîne de paramètres ex: "3F12&v=eleve" -->
{{ $params := . }}
{{ $mathaleaURL := printf "https://coopmaths.fr/alea/?%s" $params | safeURL }}
<div class="mathalea-embed" data-params="{{ $params | safeHTMLAttr }}">
  <iframe
    src="{{ $mathaleaURL }}"
    class="mathalea-iframe"
    title="Exercices MathAlea"
    loading="lazy"
    sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
    allowfullscreen>
    <p>Votre navigateur ne supporte pas les iframes.
       <a href="{{ $mathaleaURL }}" target="_blank" rel="noopener">
         Ouvrir les exercices sur coopmaths.fr →
       </a>
    </p>
  </iframe>
  <a href="{{ $mathaleaURL }}" class="mathalea-external"
     target="_blank" rel="noopener">
    Ouvrir dans MathAlea ↗
  </a>
  <button type="button" class="mathalea-focus-btn" title="Mode focus" aria-label="Ouvrir en mode focus" data-mathalea-focus="{{ $mathaleaURL }}">
    Mode focus
  </button>
</div>

<div class="mathalea-modal" id="mathalea-modal" aria-hidden="true" style="display:none;">
  <div class="mathalea-modal-backdrop"></div>
  <div class="mathalea-modal-content" role="dialog" aria-modal="true" aria-label="Exercice MathAlea">
    <button type="button" class="mathalea-modal-close" data-mathalea-close aria-label="Fermer">×</button>
    <iframe id="mathalea-modal-frame" class="mathalea-modal-frame" src="" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<style>
.mathalea-modal {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10001;
  background: rgba(0,0,0,0.85);
  padding: 1.5rem;
}
.mathalea-modal[aria-hidden="true"] { display: none; }
.mathalea-modal-content {
  background: #fff;
  border-radius: 1rem;
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  z-index: 2;
}
.mathalea-modal-close {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  background: none;
  border: none;
  font-size: 2rem;
  color: #333;
  cursor: pointer;
  z-index: 2;
}
.mathalea-modal-frame {
  width: 100%;
  height: 70vh;
  border: none;
  border-radius: 0 0 1rem 1rem;
}
.mathalea-modal-backdrop {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 1;
}
.mathalea-focus-btn {
  margin-top: 0.5em;
  padding: 0.3em 1em;
  background: #f5f5f5;
  border: 1px solid #bbb;
  border-radius: 0.5em;
  cursor: pointer;
  font-size: 1em;
  color: #333;
  transition: background 0.2s;
}
.mathalea-focus-btn:hover {
  background: #e0e0e0;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const modal = document.getElementById('mathalea-modal');
  const modalFrame = document.getElementById('mathalea-modal-frame');
  function openModal(url) {
    modalFrame.src = url;
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    modalFrame.src = '';
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  document.querySelectorAll('[data-mathalea-focus]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openModal(btn.getAttribute('data-mathalea-focus'));
    });
  });
  // Seul le bouton × ferme la modale
  modal.querySelectorAll('[data-mathalea-close]').forEach(function(el) {
    el.addEventListener('click', closeModal);
  });
  document.addEventListener('keydown', function(e) {
    if (modal.style.display === 'flex' && (e.key === 'Escape' || e.key === 'Esc')) {
      closeModal();
    }
  });
});
</script>
